site_name: XBrainLab
site_description: "XBrainLab 本地 EEG/BCI 桌面工具工程文件入口"
site_url: https://hxin-an.github.io/XBrainLab/

repo_name: XBrainLab
repo_url: https://github.com/hxin-an/XBrainLab

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切換到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切換到淺色模式
  features:
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js

exclude_docs: |
  agent/**
  api/**
  decisions/**
  development/**
  getting-started/**
  reference/**
  contributing.md
  architecture/overview.md

nav:
  - 首頁: index.md
  - 專案現況:
      - 目前真相: current.md
      - 操作方式: operations.md
  - 產品計畫:
      - 下一步: planning/now.md
      - Roadmap: planning/roadmap.md
  - 目標:
      - 目標總覽: target/README.md
      - 目標架構: target/architecture.md
      - 產品需求: target/requirements.md
      - Data Interpretation 目標: target/data_interpretation_system.md
      - Agent 目標: target/agent.md
  - 目前架構:
      - 架構總覽: architecture/README.md
      - UI 現況: architecture/ui.md
      - Backend 現況: architecture/backend.md
      - Agent 現況: architecture/agent.md
  - 驗證:
      - 驗證策略: validation/README.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
