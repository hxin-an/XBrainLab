site_name: XBrainLab
site_description: "EEG Analysis Platform with AI Agent"
site_url: https://xbrainlab.readthedocs.io/

repo_name: XBrainLab
repo_url: https://github.com/hxin-an/XBrainLab

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

exclude_docs: |
  agent/**
  api/**
  decisions/**
  development/**
  getting-started/**
  reference/**
  contributing.md
  architecture/overview.md

nav:
  - Home: index.md
  - Core:
      - Current: current.md
      - Operations: operations.md
  - Product Plan:
      - Now: planning/now.md
      - Roadmap: planning/roadmap.md
  - Architecture:
      - Overview: architecture/README.md
      - UI: architecture/ui.md
      - Backend: architecture/backend.md
      - Agent: architecture/agent.md
  - Validation:
      - Validation Strategy: validation/README.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
