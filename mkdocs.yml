site_name: XBrainLab
site_description: "EEG Analysis Platform with AI Agent"
site_url: https://xbrainlab.readthedocs.io/

repo_name: XBrainLab
repo_url: https://github.com/hxin-an/XBrainLab

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Core:
      - Current: current.md
      - Operations: operations.md
  - Target:
      - Overview: target/README.md
      - Requirements: target/requirements.md
      - Architecture: target/architecture.md
      - Agent: target/agent.md
  - Architecture:
      - Overview: architecture/README.md
      - UI: architecture/ui.md
      - Backend: architecture/backend.md
      - Data Pipeline: architecture/data_pipeline.md
      - Agent: architecture/agent.md
      - Validation Architecture: architecture/validation.md
  - Planning:
      - Now: planning/now.md
      - Roadmap: planning/roadmap.md
  - Decisions:
      - Decisions: decisions/README.md
  - Validation:
      - Validation Strategy: validation/README.md
      - Thesis Protocol: validation/thesis_protocol.md
  - Records:
      - Implementation Log: records/implementation_log.md
      - Worklog: records/worklog.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
